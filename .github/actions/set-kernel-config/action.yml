name: Set Kernel Config
description: Patch device defconfigs (add or modify entries for Kleaf validation)

inputs:
  config_list:
    required: true
    description: "Kernel config lines"

runs:
  using: composite
  steps:
  - name: Patch defconfigs
    shell: bash
    working-directory: ${{ github.workspace }}/kernel/aosp
    run: |
      set -euo pipefail

      CONFIG_LIST="${{ inputs.config_list }}"

      apply_line() {
        local file="$1"
        local line="$2"
        line="$(echo "$line" | xargs)"
        [[ -z "$line" || "$line" == \#* ]] && return

        local key value
        if [[ "$line" == *"="* ]]; then
          key="${line%%=*}"
          value="${line#*=}"
        else
          key="$line"
          value="y"
        fi

        if grep -q "^$key=" "$file"; then
          sed -i "s|^$key=.*|$key=$value|g" "$file"
        elif grep -q "^# $key is not set" "$file"; then
          sed -i "s|^# $key is not set|$key=$value|g" "$file"
        else
          echo "$key=$value" >> "$file"
        fi
      }

      patch_file() {
        local file="$1"
        if [ ! -f "$file" ]; then
          echo "Skipping $file (not found)"
          return
        fi
        echo "Patching: $file"
        while IFS= read -r line || [ -n "$line" ]; do
          apply_line "$file" "$line"
        done <<< "$CONFIG_LIST"
      }

      # Patch all device configs in the defconfig hierarchy so Kleaf validation passes
      for defconfig in \
        "../private/devices/google/lga/lga_defconfig" \
        "../private/devices/google/muzel/muzel_defconfig"; do
        patch_file "$defconfig"
      done