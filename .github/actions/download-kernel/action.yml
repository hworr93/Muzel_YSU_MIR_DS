name: 'Download Kernel Repository'
description: 'Clone Google Pixel 10 (muzel) AOSP kernel source'

inputs:
  android_version:
    description: 'Android version (e.g., android16)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true
  version:
    description: 'Combined version (e.g., android16-6.6)'
    required: true
  os_patch_level:
    description: 'OS patch level (e.g., 2025-07)'
    required: true

runs:
  using: composite
  steps:
    - name: Clone Pixel 10 Muzel Kernel
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KERNEL_REPO="https://github.com/Blackmanx/kernel_google_muzel.git"
        KERNEL_BRANCH="ZP11.251031.009"

        echo "Cloning Pixel 10 (muzel) kernel from $KERNEL_REPO (branch: $KERNEL_BRANCH)..."
        # Skip LFS files to avoid quota issues
        GIT_LFS_SKIP_SMUDGE=1 git clone --depth=1 --branch "$KERNEL_BRANCH" "$KERNEL_REPO" .

        echo "Kernel source cloned successfully."
        echo "Commit: $(git log -1 --format='%H')"
        echo "Message: $(git log -1 --format='%s')"

    - name: Create common/ symlinks to actual kernel source in aosp/
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        if [ -d "aosp" ] && [ -f "aosp/Makefile" ]; then
          echo "Symlinking kernel source files from aosp/ into common/..."
          cd common
          for f in Makefile Kbuild Kconfig COPYING CREDITS MAINTAINERS README README.md; do
            [ -f "../aosp/$f" ] && ln -sf "../aosp/$f" "$f" 2>/dev/null || true
          done
          for d in Documentation arch block certs crypto drivers fs include init io_uring ipc kernel lib mm net rust samples scripts security sound tools usr virt; do
            [ -d "../aosp/$d" ] && ln -sfn "../aosp/$d" "$d" 2>/dev/null || true
          done
          cd ..
          echo "common/ symlinks created."
        else
          echo "No aosp/ directory found; kernel source is directly in common/."
        fi

    - name: Capture Kernel Commit Metadata
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KSRC=""
        [ -d "aosp/.git" ] && KSRC="aosp"
        [ -z "$KSRC" ] && [ -d "common/.git" ] && KSRC="common"

        if [ -z "$KSRC" ]; then
          echo "No kernel source git directory found."
          exit 0
        fi

        cd "$KSRC"
        COMMIT_DATE=$(git log -1 --format=%cI)
        COMMIT_MSG=$(git log -1 --format=%s)
        echo "Kernel ($KSRC) commit date: $COMMIT_DATE"
        echo "Kernel ($KSRC) commit msg: $COMMIT_MSG"
