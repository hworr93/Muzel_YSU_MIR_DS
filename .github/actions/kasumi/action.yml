name: Setup Kasumi LKM
description: Download and integrate Anatdx/Kasumi out-of-tree kernel module
inputs:
  kasumi_branch:
    description: 'Kasumi branch or commit (empty = latest main branch tip)'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download Kasumi
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KASUMI_REPO="https://github.com/Anatdx/Kasumi.git"
        KASUMI_INPUT="${{ inputs.kasumi_branch }}"
        if [ -z "$KASUMI_INPUT" ]; then
          KASUMI_INPUT="main"
        fi

        echo "Cloning Kasumi from $KASUMI_REPO (branch: $KASUMI_INPUT)..."
        git clone --depth=1 --branch "$KASUMI_INPUT" "$KASUMI_REPO" kasumi

        echo "Kasumi cloned successfully."
        echo "Commit: $(git -C kasumi log -1 --format='%H')"
        echo "Message: $(git -C kasumi log -1 --format='%s')"

    - name: Build Kasumi Module
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KERNEL_SRC="${{ github.workspace }}/kernel"
        KASUMI_SRC="${{ github.workspace }}/kernel/kasumi/src"

        # Find Kleaf kernel build output directory
        KERNEL_OUT=""
        for candidate in "$KERNEL_SRC/bazel-out"/*/bin/private/devices/google/muzel/lga_muzel_dist/lga_muzel/kernel_aarch64; do
          if [ -f "$candidate/Module.symvers" ]; then
            KERNEL_OUT="$candidate"
            break
          fi
        done

        if [ -z "$KERNEL_OUT" ]; then
          # Broader search: find any .config in bazel-out that has CONFIG_KSU
          KERNEL_OUT=$(find "$KERNEL_SRC/bazel-out" -name ".config" -exec grep -l "CONFIG_KSU" {} \; 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)
        fi

        if [ -z "$KERNEL_OUT" ] || [ ! -f "$KERNEL_OUT/Module.symvers" ]; then
          echo "WARNING: Could not find kernel build output in Bazel tree. Skipping Kasumi module build."
          echo "Looked in: $KERNEL_SRC/bazel-out"
          find "$KERNEL_SRC/bazel-out" -name "Module.symvers" 2>/dev/null || true
          exit 0
        fi

        echo "Building Kasumi against kernel build output: $KERNEL_OUT"
        make -C "${{ github.workspace }}/kernel/aosp" ARCH=arm64 \
          O="$KERNEL_OUT" \
          M="$KASUMI_SRC" \
          modules

        # Copy module to output
        if [ -f "$KASUMI_SRC/kasumi_lkm.ko" ]; then
          mkdir -p "${{ github.workspace }}/kasumi-out"
          cp "$KASUMI_SRC/kasumi_lkm.ko" "${{ github.workspace }}/kasumi-out/"
          echo "Kasumi module built: $KASUMI_SRC/kasumi_lkm.ko"
        else
          echo "WARNING: kasumi_lkm.ko not found at $KASUMI_SRC/"
          find "$KASUMI_SRC" -name "*.ko" 2>/dev/null || true
        fi

    - name: Enable Kasumi Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KALLSYMS=y
          CONFIG_KPROBES=y
          CONFIG_FTRACE=y
