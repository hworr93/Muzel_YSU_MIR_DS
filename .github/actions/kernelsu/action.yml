name: Setup KernelSU
description: Download and configure doubledashdot KernelSU fork with version tracking
inputs:
  ksu_branch:
    description: 'KernelSU branch or commit (empty = latest master/tag)'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download KernelSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KSU_REPO="https://github.com/doubledashdot/KernelSU.git"
        KSU_INPUT="${{ inputs.ksu_branch }}"
        if [ -z "$KSU_INPUT" ]; then
          KSU_INPUT="master"
        fi

        if git ls-remote --heads "$KSU_REPO" "$KSU_INPUT" | grep -q .; then
          echo "Using KernelSU branch: $KSU_INPUT"
          git clone --branch "$KSU_INPUT" --depth=50 "$KSU_REPO" KernelSU
        else
          echo "Using KernelSU commit: $KSU_INPUT"
          git clone --depth=50 "$KSU_REPO" KernelSU
          git -C KernelSU fetch --depth=50 origin "$KSU_INPUT"
          git -C KernelSU checkout "$KSU_INPUT"
        fi

        cd KernelSU/kernel

        COMMITS_COUNT=$(git rev-list --count HEAD)
        BASE_VERSION=30000
        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        sed -i "s/^CFLAGS_ksu.o += -DKSU_VERSION=[0-9]*$/CFLAGS_ksu.o += -DKSU_VERSION=${KSU_VERSION}/" Makefile

        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^ccflags-y += -DKSU_VERSION_TAG=.*$/ccflags-y += -DKSU_VERSION_TAG=\"${KSU_GIT_TAG}\"/" Makefile

        cd "${{ github.workspace }}/kernel/common"

        ln -sf "$(realpath --relative-to=drivers "${{ github.workspace }}/kernel/KernelSU/kernel")" drivers/kernelsu
        grep -q "kernelsu" drivers/Makefile || echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile
        grep -q "source \"drivers/kernelsu/Kconfig\"" drivers/Kconfig || \
          sed -i "/endmenu/i\source \"drivers/kernelsu/Kconfig\"" drivers/Kconfig

    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))

        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV

    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
