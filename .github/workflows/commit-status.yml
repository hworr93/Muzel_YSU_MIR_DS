name: Commit Status Report

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build commit summary
        shell: bash
        run: |
          set -euo pipefail

          summary_file="$GITHUB_STEP_SUMMARY"

          sanitize_cell() {
            local value="$1"
            value="${value//$'\r'/ }"
            value="${value//$'\n'/ }"
            value="${value//|/\\|}"
            printf '%s' "$value"
          }

          github_latest_commit() {
            curl -fsSL "https://api.github.com/repos/Anatdx/YukiSU/commits/main" | jq -r '.sha'
          }

          github_latest_message() {
            curl -fsSL "https://api.github.com/repos/Anatdx/YukiSU/commits/main" | jq -r '.commit.message | split("\n")[0]'
          }

          {
            echo "# Commit Status Report"
            echo ""
            echo "This report shows the latest upstream YukiSU commit."
            echo ""
          } >> "$summary_file"

          {
            echo "## YukiSU"
            echo ""
            echo "| Branch | Latest Commit | Latest Message |"
            echo "| --- | --- | --- |"
          } >> "$summary_file"

          latest_yukisu_commit="$(github_latest_commit)"
          latest_yukisu_message="$(github_latest_message)"
          latest_yukisu_message="$(sanitize_cell "$latest_yukisu_message")"

          printf '| %s | %s | %s |\n' "main" "$latest_yukisu_commit" "$latest_yukisu_message" >> "$summary_file"
