name: Build Pixel 10 (Muzel) Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        type: choice
        options:
          - Action
          - Pre-Release
          - Release
        default: Action
      feature_set:
        description: "Feature Set"
        type: choice
        options:
          - FULL
          - YUKISU+KASUMI+MIRAGE+BBG+NET+DS
          - YUKISU+KASUMI+MIRAGE+BBG
          - YUKISU+KASUMI+MIRAGE
          - YUKISU+KASUMI
          - YUKISU
          - NONE
        default: FULL
      yukisu_branch:
        description: "YukiSU branch or commit (empty = latest main branch tip)"
        type: string
        required: false
        default: ""
      mirage_branch:
        description: "Mirage branch or commit (empty = latest master branch tip)"
        type: string
        required: false
        default: ""
      kasumi_branch:
        description: "Kasumi branch or commit (empty = latest main branch tip)"
        type: string
        required: false
        default: ""

jobs:
  prepare-ccache:
    name: Prepare ccache binary (download once)
    runs-on: self-hosted
    steps:
      - name: Download custom ccache once
        run: |
          set -uo pipefail
          echo "::group::Download ccache"
          url="https://raw.githubusercontent.com/WildKernels/kernel_patches/refs/heads/main/ccache/ccache-x86-64"
          ok=0
          for attempt in 1 2 3 4 5 6; do
            if curl -LfsS --connect-timeout 30 --max-time 120 -H "User-Agent: Mozilla/5.0" "$url" -o ccache && [ -s ccache ]; then
              ok=1; break
            fi
            echo "attempt $attempt failed (GitHub raw 504/throttle); backing off..."
            sleep $(( attempt * 5 + RANDOM % 6 ))
          done
          if [ "$ok" = 1 ]; then
            echo "✅ downloaded ccache once for all matrix jobs"
          else
            echo "::warning::custom ccache download failed; matrix jobs will fall back to the apt ccache"
            rm -f ccache
          fi
          echo "::endgroup::"
      - name: Upload ccache artifact
        uses: actions/upload-artifact@v7
        with:
          name: ccache-binary
          path: ccache
          retention-days: 1
          if-no-files-found: warn

  build-muzel:
    needs: prepare-ccache
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/config/muzel.json
      feature_set: ${{ inputs.feature_set || 'FULL' }}
      yukisu_branch: ${{ inputs.yukisu_branch }}
      mirage_branch: ${{ inputs.mirage_branch }}
      kasumi_branch: ${{ inputs.kasumi_branch }}
    secrets: inherit

  rej:
    if: ${{ always() }}
    runs-on: self-hosted
    permissions:
      actions: read
      contents: read
    needs:
    - build-muzel

    steps:
    - name: Download Misc Artifacts
      uses: actions/download-artifact@v7
      with:
        path: ./downloaded-artifacts
        pattern: '*-Rejects'
        merge-multiple: false

    - name: Process Reject Artifacts
      run: |
        mkdir -p aio-rejects

        for dir in ./downloaded-artifacts/*-Rejects; do
            [ -d "$dir" ] || continue

            dirname=$(basename "$dir")
            original_name=${dirname%-Rejects}
            source_dir="$dir"

            if [ -d "$dir/patch-rejects" ]; then
              source_dir="$dir/patch-rejects"
            fi

            mapfile -t rej_files < <(find "$source_dir" -type f -name '*.rej' | sort)
            filtered_rej_files=()
            for rej_file in "${rej_files[@]}"; do
              rel_rej="${rej_file#${source_dir}/}"
              rel_name="$(basename "$rel_rej")"
              if [ "$rel_rej" = "common/mm/rmap.c.rej" ] || [ "$rel_name" = "i2c-nomadik.c.rej" ]; then
                echo "Skipping $rel_rej because it is an ignored reject file"
                continue
              fi
              filtered_rej_files+=("$rej_file")
            done

            if [ "${#filtered_rej_files[@]}" -eq 0 ]; then
              echo "Skipping $dirname because it only contains ignored reject files"
              continue
            fi

            mkdir -p "aio-rejects/$original_name"

            if [ -d "$dir/patch-rejects" ]; then
              cp -r "$dir/patch-rejects/." "aio-rejects/$original_name/"
            else
              cp -r "$dir/." "aio-rejects/$original_name/"
            fi

            find "aio-rejects/$original_name" -type f -name 'i2c-nomadik.c.rej' -delete
        done

        if [ "$(ls -A aio-rejects)" ]; then
            cd aio-rejects
            zip -r -q -9 ../AIO-REJ.zip .
            cd ..
        else
            echo "No rejects found to upload."
        fi

    - name: Rejects Summary
      run: |
        echo "Reject artifacts were collected locally only and are not uploaded." >> "$GITHUB_STEP_SUMMARY"

    - name: Upload AIO-REJ Artifact
      uses: actions/upload-artifact@v7
      with:
        name: AIO-REJ
        path: AIO-REJ.zip
        if-no-files-found: ignore

  summary:
    if: ${{ always() }}
    runs-on: self-hosted
    permissions:
      actions: write
      contents: read
    needs:
    - build-muzel

    steps:
    - name: Download All Build Summaries
      uses: actions/download-artifact@v7
      with:
        path: ./summaries
        pattern: '*-Summary'
        merge-multiple: true

    - name: 📋 Workflow Build Summary
      run: |
        {
          echo "# 📋 Build Summary — $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo
          echo "**Feature Set:** ${{ inputs.feature_set }}"
          echo "**YukiSU Branch:** ${{ inputs.yukisu_branch || 'latest main' }}"
          echo

          SUCCESS_COUNT=0
          FAIL_COUNT=0

          for f in ./summaries/*.md; do
            [ -f "$f" ] || continue
            if grep -q "✅ Success" "$f"; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done

          TOTAL=$((SUCCESS_COUNT + FAIL_COUNT))
          echo "**Results:** ${SUCCESS_COUNT}/${TOTAL} succeeded"
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "  - ❌ ${FAIL_COUNT} failed"
          fi
          echo
          echo "---"
          echo

          for f in ./summaries/*.md; do
            [ -f "$f" ] || continue
            cat "$f"
            echo
            echo "---"
            echo
          done
        } >> "$GITHUB_STEP_SUMMARY"

    - name: 🧹 Cleanup Summary Files
      if: ${{ always() }}
      run: rm -rf ./summaries

    - name: 🧹 Delete Summary Artifacts
      if: ${{ always() }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        RUN_ID="${{ github.run_id }}"
        ARTIFACTS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" --jq '.artifacts[] | select(.name | endswith("-Summary")) | .id')
        for id in $ARTIFACTS; do
          echo "Deleting summary artifact id=$id"
          gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/${id}" || true
        done

  release:
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_type == 'Pre-Release' || inputs.release_type == 'Release') }}
    permissions:
      contents: write
    needs:
    - build-muzel

    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_NOTES: .github/config/RELEASE_NOTES.md
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
    - name: Validate Build
      run: |
        set -euo pipefail
        result="${{ needs.build-muzel.result }}"
        if [[ "$result" != "success" ]]; then
          echo "Build did not succeed (result: $result)"
          exit 1
        fi

    - name: Free Disk Space
      if: true
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: true
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
        rm_cmd: "rmz"
        rmz_version: "3.1.1"
        testing: false

    - name: Checkout code
      uses: actions/checkout@v5

    - name: Generate New Tag
      id: tag
      if: inputs.release_type != 'Action'
      run: |
        mapfile -t RELEASE_TAGS < <(gh api --paginate "repos/${{ github.repository }}/tags?per_page=100" --jq '.[].name' 2>/dev/null | grep -E '^r[0-9]+$' || true)

        LATEST_REV=0
        for TAG in "${RELEASE_TAGS[@]}"; do
          REV="${TAG#r}"
          if [[ "$REV" =~ ^[0-9]+$ && "$REV" -gt "$LATEST_REV" ]]; then
            LATEST_REV="$REV"
          fi
        done

        if [[ "$LATEST_REV" -gt 0 ]]; then
          NEW_TAG="r$((LATEST_REV + 1))"
        else
          NEW_TAG="r1"
        fi

        if [[ ${#RELEASE_TAGS[@]} -gt 0 ]]; then
          echo "Latest r-tag: r${LATEST_REV}"
        else
          echo "No existing r-tags found; starting at r1"
        fi
        echo "New tag: $NEW_TAG"
        echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Set Release Title
      id: release_meta
      run: |
        set -euo pipefail
        if [[ "${NEW_TAG}" =~ ^r([0-9]+)$ ]]; then
          REV_NUM="${BASH_REMATCH[1]}"
          release_title="Pixel 10 (Muzel) Kernel Release ${REV_NUM}"
        else
          release_title="Pixel 10 (Muzel) Kernel Release ${NEW_TAG}"
        fi
        echo "release_title=$release_title" >> "$GITHUB_OUTPUT"

    - name: Extract YukiSU Version Info
      id: yukisu_version
      run: |
        set -euo pipefail

        YUKISU_REPO="https://github.com/Anatdx/YukiSU.git"
        YUKISU_INPUT="${{ inputs.yukisu_branch }}"
        if [ -z "$YUKISU_INPUT" ]; then
          YUKISU_INPUT="main"
        fi

        if git ls-remote --heads "$YUKISU_REPO" "$YUKISU_INPUT" | grep -q .; then
          echo "Cloning YukiSU from branch: $YUKISU_INPUT"
          git clone --branch "$YUKISU_INPUT" --depth=50 "$YUKISU_REPO" /tmp/yukisu
          cd /tmp/yukisu
          YUKISU_COMMIT=$(git rev-parse HEAD)
        else
          echo "Cloning YukiSU from main branch, then checking out commit: $YUKISU_INPUT"
          git clone --depth=50 "$YUKISU_REPO" /tmp/yukisu
          cd /tmp/yukisu
          git fetch --depth=50 origin "$YUKISU_INPUT"
          git checkout "$YUKISU_INPUT"
          YUKISU_COMMIT="$YUKISU_INPUT"
        fi

        COMMITS_COUNT=$(git rev-list --count HEAD)
        BASE_VERSION=30000
        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "no-tag")

        MANAGER_RUN_ID=$(curl -fsSL "https://api.github.com/repos/Anatdx/YukiSU/actions/workflows/build-manager-ci.yml/runs?head_sha=${YUKISU_COMMIT}" | jq -r '.workflow_runs[0].id // empty')
        if [[ -n "${MANAGER_RUN_ID:-}" ]]; then
          KSU_MANAGER="https://github.com/Anatdx/YukiSU/actions/runs/${MANAGER_RUN_ID}"
        else
          KSU_MANAGER="https://github.com/Anatdx/YukiSU/actions/workflows/build-manager-ci.yml"
        fi

        echo "Commits count: $COMMITS_COUNT"
        echo "YukiSU Version: $KSU_VERSION"
        echo "YukiSU Git Tag: $KSU_GIT_TAG"
        echo "YukiSU Manager: $KSU_MANAGER"

        echo "KSU_COMMIT=$YUKISU_COMMIT" >> $GITHUB_ENV
        echo "KSU_COMMITS_COUNT=$COMMITS_COUNT" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_MANAGER=$KSU_MANAGER" >> $GITHUB_ENV

    - name: Set release body
      run: |
        set -e
        RELEASE_NOTES_PATH="$RELEASE_NOTES"
        : > release_body.md
        python3 .github/scripts/render_release_body.py "$RELEASE_NOTES_PATH" > release_body.md

    - name: Publish release notes preview
      run: |
        {
          echo "## Release Notes Preview"
          echo
          cat release_body.md
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Download AnyKernel3 Artifacts
      uses: actions/download-artifact@v7
      with:
        path: release-assets
        pattern: '*-AnyKernel3'
        merge-multiple: false

    - name: Zip AnyKernel3 for Release
      run: |
        set -e
        shopt -s nullglob
        for dir in release-assets/*-AnyKernel3; do
          zip_name="${dir}.zip"
          rm -f "$zip_name"
          cd "$dir"
          zip -r -q -9 "../$(basename "$zip_name")" .
          cd - >/dev/null
        done

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.new_tag }}
        name: ${{ steps.release_meta.outputs.release_title }}
        body_path: release_body.md
        draft: false
        prerelease: ${{ inputs.release_type == 'Pre-Release' }}
        files: |
          release-assets/**/*.zip
          release-assets/**/*-boot*.img
